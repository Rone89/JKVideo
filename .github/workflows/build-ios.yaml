name: Build Unsigned iOS IPA

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        working-directory: ios
        run: |
          pod repo update
          pod install --repo-update

      - name: Set app version to tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $TAG" ios/JKVideo/Info.plist

      - name: Build (unsigned)
        working-directory: ios
        run: |
          xcodebuild \
            -workspace JKVideo.xcworkspace \
            -scheme JKVideo \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ENABLE_BITCODE=NO \
            clean build 2>&1 | xcpretty

      - name: Package IPA
        run: |
          APP_PATH=$(find ios/build/Build/Products -name "JKVideo.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ .app not found"
            find ios/build -type d -name "*.app" || true
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          TAG="${GITHUB_REF#refs/tags/v}"
          IPA_NAME="JKVideo-${TAG:-unsigned}.ipa"
          zip -r -y "$IPA_NAME" Payload/
          echo "IPA_NAME=$IPA_NAME" >> $GITHUB_ENV
          echo "✅ Built: $IPA_NAME"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa
          path: '*.ipa'
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "JKVideo ${{ github.ref_name }}"
          generate_release_notes: true
          files: '*.ipa'
          draft: false
          prerelease: false
